<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roomscan Web UI</title>
    <!-- Diagnostic trap: a plain (non-module) script installed BEFORE the
         module below, so it captures failures a `<script type=module>` would
         otherwise swallow silently (import-map miss, module 404/parse error,
         `three` failing to load). Everything is mirrored to an on-page panel
         (#diag-log) so it's readable over VNC / on a browser where devtools
         aren't handy. window.__diag(msg, level) is the shared sink. -->
    <script>
    (function () {
        var buf = [];
        function render() {
            var el = document.getElementById('diag-log');
            if (el) { el.textContent = buf.slice(-60).join('\n'); el.scrollTop = el.scrollHeight; }
        }
        function stamp() {
            try { return new Date().toISOString().substr(11, 12); } catch (e) { return '??'; }
        }
        window.__diag = function (msg, level) {
            buf.push(stamp() + ' ' + (level || 'info').toUpperCase() + ' ' + msg);
            try { (level === 'error' ? console.error : console.log)('[diag] ' + msg); } catch (e) {}
            render();
        };
        window.addEventListener('error', function (e) {
            var m = (e && (e.message || (e.error && e.error.message))) || 'unknown';
            var where = e && e.filename ? (' @ ' + e.filename + ':' + (e.lineno || '?')) : '';
            // Resource-load errors (failed module/script/img) arrive as an
            // event on the element with no .message; note the target's src.
            if (!e.message && e.target && (e.target.src || e.target.href)) {
                m = 'resource failed to load: ' + (e.target.src || e.target.href);
            }
            window.__diag('window.error: ' + m + where, 'error');
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
            var r = e && e.reason; window.__diag('unhandledrejection: ' + ((r && (r.message || r)) || r), 'error');
        });
        document.addEventListener('DOMContentLoaded', function () {
            render();
            window.__diag('DOMContentLoaded; url=' + location.href, 'info');
        });
        window.__diag('inline diag installed; protocol=' + location.protocol + ' host=' + location.host, 'info');
    })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ------------------------------------------------------------------ *
         * Design tokens (§8.2). Extend, don't replace — a `--warning` token   *
         * is added for the busy/timeout toast state.                          *
         * ------------------------------------------------------------------ */
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(22, 24, 30, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --topbar-h: 48px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
        }

        /* Full-bleed 3D scene underneath every overlay region. */
        #canvas-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* ---- component: card (glassmorphic base, shared by every region) ---- */
        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* ================= layout regions (§8.1) ================= */

        /* Top bar — title, connection status, Phase-4 mode-switch slot. */
        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--topbar-h);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 0 20px;
            border-radius: 0;
            border-left: none; border-right: none; border-top: none;
        }
        .app-title { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.02em; }
        #mode-switch-slot { flex: 1; }   /* reserved for the Real-Time/SLAM switch */

        .status-indicator {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem; font-weight: 500; color: var(--text-muted);
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background-color: var(--danger);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        .dot.connected { background-color: var(--success); box-shadow: 0 0 12px var(--success); }

        /* Left rail — read-only telemetry HUD. NEVER intercepts OrbitControls. */
        #left-rail {
            position: fixed;
            top: calc(var(--topbar-h) + 16px);
            left: 16px;
            width: 232px;
            z-index: 10;
            padding: 16px;
            pointer-events: none;               /* the working #metrics-overlay pattern */
            font-family: 'JetBrains Mono', monospace;
            display: flex; flex-direction: column; gap: 6px;
        }
        #left-rail * { pointer-events: none; }  /* and everything inside it (§8.1) */

        .hud-row { display: flex; justify-content: space-between; gap: 16px; font-size: 0.8rem; color: var(--text-muted); }
        .hud-val { color: var(--text-main); font-weight: 700; }
        .hud-section-label {
            margin-top: 8px; font-family: 'Inter', sans-serif;
            font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--text-muted); font-weight: 600;
        }
        .hud-stream { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; font-size: 0.78rem; color: var(--text-muted); }
        .hud-stream__label { color: var(--text-main); }
        .hud-stream__jit { color: var(--text-muted); min-width: 44px; text-align: right; }
        .hud-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; margin: 2px 0; }
        .hud-bar__fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s ease; }

        /* Sensors (Phase 2): gizmo + compass side by side, then sparklines. */
        .sensor-widgets { display: flex; gap: 8px; justify-content: space-between; margin: 2px 0; }
        .sensor-widget { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .sensor-widget canvas { display: block; }
        .sensor-cap { font-size: 0.62rem; color: var(--text-muted); text-align: center; }
        .sensor-spark { display: block; width: 100%; height: 32px; margin: 1px 0 4px 0; }

        /* Right rail — interactive control panel: scrollable stack of groups. */
        #right-rail {
            position: fixed;
            top: calc(var(--topbar-h) + 16px);
            right: 16px;
            width: 300px;
            max-height: calc(100vh - var(--topbar-h) - 96px);   /* viewport-bounded from the start (§8.1) */
            overflow-y: auto;
            z-index: 10;
            padding: 16px;
            display: flex; flex-direction: column; gap: 14px;
        }

        /* ---- component: control-group (collapsible section) ---- */
        .control-group { display: flex; flex-direction: column; gap: 12px; }
        .control-group__header {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%;
            background: none; border: none; padding: 0 0 2px 0;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
            cursor: pointer;
            border-bottom: 1px solid var(--panel-border);
        }
        .control-group__header:hover { color: var(--text-main); }
        .control-group__header .chevron { transition: transform 0.2s ease; font-size: 0.7rem; }
        .control-group.collapsed .chevron { transform: rotate(-90deg); }
        .control-group__body { display: flex; flex-direction: column; gap: 10px; }
        .control-group.collapsed .control-group__body { display: none; }

        .field-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; }

        /* ---- component: button (default + primary) ---- */
        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
        }
        button:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
        button:active { transform: translateY(1px); }
        button.primary {
            background: var(--accent); border-color: var(--accent); color: white;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
        }
        button.primary:hover { background: var(--accent-hover); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }

        /* two side-by-side action buttons (replaces the old one-off grid-2) */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* ---- component: segmented-control (2–3-way mutually-exclusive row) ---- */
        .segmented { display: flex; gap: 0; border: 1px solid var(--panel-border); border-radius: 8px; overflow: hidden; }
        .segmented button {
            flex: 1; border: none; border-radius: 0; background: rgba(255,255,255,0.03);
            padding: 8px 6px; font-size: 0.8rem;
            border-right: 1px solid var(--panel-border);
        }
        .segmented button:last-child { border-right: none; }
        .segmented button.active { background: var(--accent); color: white; }
        .segmented button.active:hover { background: var(--accent-hover); }
        .segmented--sm button { padding: 4px 8px; font-size: 0.7rem; }

        /* generic hide utility (shared by the transport block + IR card) */
        .hidden { display: none !important; }

        /* ---- Capture & Playback (Web Phase 3) ---- */
        #btn-record.recording { background: var(--danger); border-color: var(--danger); color: white; }
        #btn-record.recording:hover { background: #f87171; }
        #btn-record:disabled { opacity: 0.4; cursor: not-allowed; }
        .cap-status { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text-muted); min-height: 1em; }
        .cap-status.rec { color: var(--danger); }
        .cap-list { display: flex; flex-direction: column; gap: 4px; max-height: 160px; overflow-y: auto; }
        .cap-row {
            display: flex; justify-content: space-between; gap: 8px; align-items: baseline;
            padding: 6px 8px; border-radius: 6px; cursor: pointer;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
            font-size: 0.76rem; color: var(--text-main);
        }
        .cap-row:hover { background: rgba(255,255,255,0.08); }
        .cap-row.active { border-color: var(--accent); background: rgba(59,130,246,0.14); }
        .cap-row__name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cap-row__meta { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; flex: none; }
        .transport { display: flex; flex-direction: column; gap: 10px; padding-top: 4px; border-top: 1px solid var(--panel-border); }
        #seek { width: 100%; accent-color: var(--accent); cursor: pointer; }

        /* ---- component: toggle / checkbox ---- */
        .toggle { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-muted); cursor: pointer; }
        .toggle input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
        .toggle--sm { font-size: 0.72rem; }

        /* Bottom-left — IR monitor canvas card. */
        #ir-card {
            position: fixed;
            left: 16px; bottom: 52px;
            z-index: 12;
            width: 260px;
            padding: 10px;
            display: flex; flex-direction: column; gap: 8px;
        }
        #ir-card.hidden { display: none; }
        .ir-card__header { display: flex; align-items: center; gap: 8px; }
        .ir-card__title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600; flex: 1; }
        .ir-card__close {
            background: none; border: none; color: var(--text-muted);
            font-size: 1.1rem; line-height: 1; padding: 0 4px; width: auto;
        }
        .ir-card__close:hover { color: var(--text-main); background: none; }
        #ir-canvas {
            width: 100%; height: auto; aspect-ratio: 4 / 3;
            background: #000; border-radius: 6px;
            image-rendering: pixelated;         /* crisp nearest-neighbour upscale (§7.3) */
        }

        /* Bottom — collapsible full-width event-log console. */
        #log-console {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            z-index: 15;
            border-radius: 0;
            border-left: none; border-right: none; border-bottom: none;
            display: flex; flex-direction: column;
            max-height: 28vh;
        }
        .log-console__header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 20px;
            font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); font-weight: 600; cursor: pointer;
        }
        .log-console__header:hover { color: var(--text-main); }
        .log-console__chevron { transition: transform 0.2s ease; }
        #log-console.collapsed .log-console__chevron { transform: rotate(180deg); }
        .log-console__body {
            overflow-y: auto;
            padding: 4px 20px 10px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.76rem;
            max-height: 22vh;
        }
        #log-console.collapsed .log-console__body { display: none; }

        /* ---- component: log-line (timestamp · source · message) ---- */
        .log-line { display: grid; grid-template-columns: auto auto 1fr; gap: 10px; padding: 1px 0; color: var(--text-main); }
        .log-line__ts { color: var(--text-muted); }
        .log-line__src { text-transform: uppercase; font-size: 0.66rem; align-self: center; letter-spacing: 0.04em; color: var(--text-muted); }
        .log-line--event .log-line__src { color: var(--accent-hover); }
        .log-line--cmd .log-line__src { color: var(--success); }
        .log-line__msg { white-space: pre-wrap; word-break: break-word; }

        /* Toast layer — floats ABOVE the collapsible console (always visible). */
        #toast-layer {
            position: fixed;
            left: 50%; bottom: 56px;
            transform: translateX(-50%);
            z-index: 30;
            pointer-events: none;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        /* ---- component: toast (variants ok/busy/timeout/error) ---- */
        .toast {
            padding: 10px 18px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 500;
            background: var(--panel-bg);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            box-shadow: 0 10px 30px -8px rgba(0,0,0,0.6);
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .toast--show { opacity: 1; transform: translateY(0); }
        .toast--ok { border-color: var(--success); color: var(--success); }
        .toast--busy, .toast--timeout { border-color: var(--warning); color: var(--warning); }
        .toast--error { border-color: var(--danger); color: var(--danger); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- Top bar (§8.1): title · reserved mode-switch slot · connection status -->
    <div id="topbar" class="card">
        <span class="app-title">Roomscan</span>
        <div id="mode-switch-slot">
            <!-- Real-Time ↔ SLAM (web Phase 4); active state driven from `state`. -->
            <div class="segmented" id="seg-mode">
                <button data-mode="realtime" class="active">Real-Time</button>
                <button data-mode="slam">SLAM</button>
            </div>
        </div>
        <div class="status-indicator">
            <span id="conn-text">Offline</span>
            <div class="dot" id="conn-dot"></div>
        </div>
    </div>

    <!-- Left rail (§7.4): read-only telemetry HUD. pointer-events:none. -->
    <div id="left-rail" class="card">
        <div class="hud-row"><span>View FPS</span><span class="hud-val" id="hud-view-fps">--</span></div>
        <div class="hud-row"><span>Device FPS</span><span class="hud-val" id="hud-device-fps">--</span></div>
        <div class="hud-section-label">Streams</div>
        <div id="hud-streams"></div>
        <div class="hud-section-label">Link</div>
        <div class="hud-row"><span>Bandwidth</span><span class="hud-val" id="hud-link-value">--</span></div>
        <div class="hud-bar"><div class="hud-bar__fill" id="hud-link-fill"></div></div>
        <div class="hud-row"><span>Drops</span><span class="hud-val" id="hud-drops">0</span></div>
        <div class="hud-row"><span>Gaps</span><span class="hud-val" id="hud-gaps">0</span></div>

        <!-- Sensors (streams 9/10) — gizmo · compass · sparklines (Web Phase 2). -->
        <div class="hud-section-label">Sensors</div>
        <div class="sensor-widgets">
            <div class="sensor-widget">
                <canvas id="sensor-gizmo" width="1" height="1"></canvas>
                <span class="sensor-cap">Orientation</span>
            </div>
            <div class="sensor-widget">
                <canvas id="sensor-compass" width="1" height="1"></canvas>
                <span class="sensor-cap" id="sensor-heading">—</span>
            </div>
        </div>
        <div class="hud-row"><span>Fusion</span><span class="hud-val" id="sensor-fusion">off</span></div>
        <div class="hud-row"><span>Pressure</span><span class="hud-val" id="sensor-press-val">—</span></div>
        <canvas id="sensor-press-spark" class="sensor-spark" width="1" height="1"></canvas>
        <div class="hud-row"><span>Temp</span><span class="hud-val" id="sensor-temp-val">—</span></div>
        <canvas id="sensor-temp-spark" class="sensor-spark" width="1" height="1"></canvas>

        <!-- SLAM HUD (web Phase 4): shown only in SLAM mode (slam.js toggles). -->
        <div id="slam-hud" class="hidden">
            <div class="hud-section-label">SLAM</div>
            <div class="hud-row"><span>Tracking</span><span class="hud-val" id="slam-track">—</span></div>
            <div class="hud-row"><span>Fitness</span><span class="hud-val" id="slam-fitness">—</span></div>
            <div class="hud-row"><span>RMSE</span><span class="hud-val" id="slam-rmse">—</span></div>
            <div class="hud-row"><span>Frames</span><span class="hud-val" id="slam-frames">0</span></div>
            <div class="hud-row"><span>Vertices</span><span class="hud-val" id="slam-verts">0</span></div>
            <div class="hud-row"><span>SLAM</span><span class="hud-val" id="slam-ms">—</span></div>
        </div>
    </div>

    <!-- Right rail (§8.1): interactive control panel, collapsible groups. -->
    <div id="right-rail" class="card">
        <div class="control-group">
            <button class="control-group__header"><span>Device</span><span class="chevron">&#9662;</span></button>
            <div class="control-group__body">
                <button class="primary" id="btn-ping">Ping Device</button>
                <div class="btn-row">
                    <button id="btn-calib">Calibrate</button>
                    <button id="btn-reinit">Reinit</button>
                </div>
                <div class="field-label">Usecase</div>
                <div class="segmented" id="seg-usecase">
                    <button data-uc="0">AR Range</button>
                    <button data-uc="1">Precision</button>
                </div>
            </div>
        </div>

        <div class="control-group">
            <button class="control-group__header"><span>View</span><span class="chevron">&#9662;</span></button>
            <div class="control-group__body">
                <div class="field-label">Color Mode</div>
                <div class="segmented" id="seg-color">
                    <button data-mode="depth">Depth</button>
                    <button data-mode="reflectance">Reflect</button>
                    <button data-mode="confidence">Confid</button>
                </div>
                <button id="btn-reset-cam">Reset Camera</button>
            </div>
        </div>

        <div class="control-group">
            <button class="control-group__header"><span>IR Monitor</span><span class="chevron">&#9662;</span></button>
            <div class="control-group__body">
                <label class="toggle"><input type="checkbox" id="chk-ir-show" checked><span>Show IR card</span></label>
                <div class="field-label">Colormap</div>
                <div class="segmented" id="seg-ir-colormap">
                    <button data-colormap="gray">Gray</button>
                    <button data-colormap="turbo">Turbo</button>
                </div>
                <label class="toggle"><input type="checkbox" id="chk-ir-freeze"><span>Freeze range</span></label>
            </div>
        </div>

        <!-- Capture & Playback (Web Phase 3): record live, browse + load captures,
             transport controls in replay. Active/disabled state is driven from the
             server's session/captures echo (one-way flow), never local clicks. -->
        <div class="control-group">
            <button class="control-group__header"><span>Capture &amp; Playback</span><span class="chevron">&#9662;</span></button>
            <div class="control-group__body">
                <button id="btn-record">&#9679; Record</button>
                <div class="cap-status" id="record-status"></div>

                <div class="field-label">Source</div>
                <div class="cap-list" id="cap-list"></div>
                <button id="btn-refresh-caps">&#8635; Refresh list</button>

                <div class="transport hidden" id="transport">
                    <div class="btn-row">
                        <button id="btn-playpause">Pause</button>
                        <button id="btn-restart">&#8676; Restart</button>
                    </div>
                    <div class="field-label">Speed</div>
                    <div class="segmented segmented--sm" id="seg-speed">
                        <button data-fps="15">0.5&times;</button>
                        <button data-fps="30">1&times;</button>
                        <button data-fps="60">2&times;</button>
                        <button data-fps="0">Max</button>
                    </div>
                    <label class="toggle toggle--sm"><input type="checkbox" id="chk-loop"><span>Loop at end</span></label>
                    <input type="range" id="seek" min="0" max="1000" value="0">
                    <div class="cap-status" id="pos-status">&mdash;</div>
                </div>
            </div>
        </div>

        <!-- SLAM (web Phase 4): mesh display options + save. Shown only in SLAM
             mode; all state driven from the server `state`/`saved` echo. -->
        <div class="control-group hidden" id="slam-group">
            <button class="control-group__header"><span>SLAM</span><span class="chevron">&#9662;</span></button>
            <div class="control-group__body">
                <label class="toggle"><input type="checkbox" id="chk-slam-traj" checked><span>Trajectory trail</span></label>
                <label class="toggle"><input type="checkbox" id="chk-slam-follow" checked><span>Follow camera</span></label>
                <div class="field-label">Walls</div>
                <div class="segmented segmented--sm" id="seg-walls">
                    <button data-walls="split">Split</button>
                    <button data-walls="solid">Solid</button>
                </div>
                <button class="primary" id="btn-save" disabled>&#128190; Save map</button>
                <div class="field-label">Saved maps</div>
                <div class="cap-list" id="saved-list"></div>
            </div>
        </div>
    </div>

    <!-- Bottom-left (§7.3): IR monitor canvas card, independently toggleable. -->
    <div id="ir-card" class="card">
        <div class="ir-card__header">
            <span class="ir-card__title">IR Monitor</span>
            <div class="segmented segmented--sm" id="ir-card-colormap">
                <button data-colormap="gray">Gray</button>
                <button data-colormap="turbo">Turbo</button>
            </div>
            <label class="toggle toggle--sm"><input type="checkbox" id="ir-card-freeze"><span>Freeze</span></label>
            <button class="ir-card__close" id="ir-card-close" title="Hide">&times;</button>
        </div>
        <canvas id="ir-canvas" width="1" height="1"></canvas>
    </div>

    <!-- Bottom (§7.1): collapsible full-width event-log console. -->
    <div id="log-console" class="card">
        <div class="log-console__header" id="log-toggle">
            <span>Event Log</span>
            <span class="log-console__chevron">&#9662;</span>
        </div>
        <div class="log-console__body" id="log-lines"></div>
    </div>

    <!-- Toast layer (§7.1): floats above the console, visible even collapsed. -->
    <div id="toast-layer"></div>

    <!-- On-page diagnostic log (populated by window.__diag). Visible so a
         failure is traceable without opening devtools. -->
    <div id="diag-log" style="position:fixed;left:8px;bottom:8px;max-width:40vw;max-height:34vh;
        overflow:auto;z-index:99999;background:rgba(0,0,0,0.82);color:#7fe0ff;
        font:11px/1.45 'JetBrains Mono',ui-monospace,monospace;white-space:pre-wrap;
        padding:8px 10px;border:1px solid rgba(255,255,255,0.18);border-radius:6px;">diag: waiting…</div>

    <!-- Import map: lets the browser resolve the bare "three" specifier that
         three's jsm addons (e.g. OrbitControls) import internally. Without this,
         OrbitControls fails with "Failed to resolve module specifier 'three'",
         which aborts app.js entirely (no WebSocket, no data). Must appear before
         the module script below.
         Vendored locally (host/src/roomscan/static/vendor/) so the viewer is
         fully self-contained: a headless / air-gapped host has no route to
         unpkg, and a failed CDN fetch here silently kills the whole page (the
         status just sits at its initial "Offline"). -->
    <script type="importmap">
    {
        "imports": {
            "three": "/static/vendor/three/three.module.js",
            "three/addons/": "/static/vendor/three/addons/"
        }
    }
    </script>

    <!-- Composition root: constructs the ws.js hub and every feature module. -->
    <script type="module" src="app.js"></script>
</body>
</html>
